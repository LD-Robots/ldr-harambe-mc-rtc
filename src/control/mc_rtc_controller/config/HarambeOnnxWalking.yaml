# HarambeOnnxWalking controller configuration
# Runs ONNX RL policy directly — bypasses mc_rtc QP solver.
# mc_mujoco applies PD control using PDgains_sim.dat.

# --- ONNX policy settings ---
onnx:
  model_path: /home/alex/Documents/GitHub/training/logs/rsl_rl/harambe_locomotion/2026-03-30_23-03-35/policy.onnx
  action_scale: 0.10
  clip_actions: 5.0
  decimation: 4        # Policy at 50Hz (mc_rtc 200Hz / 4)
  warmup_steps: 0      # Start policy immediately

# --- Velocity commands ---
commands:
  vx: 0.0
  vy: 0.0
  yaw_rate: 0.0

# --- IMU sensor name (for gravity/angular velocity) ---
imu_sensor: PelvisIMU

# --- Observer pipeline (KinematicInertial needed for base orientation) ---
ObserverPipelines:
  - name: MainPipeline
    gui: true
    observers:
      - type: Encoder
        update: true
