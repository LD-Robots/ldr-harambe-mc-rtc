# HarambeWalking - LIPM Stabilizer + FSM walking controller
# No force sensors required. Uses IMU + kinematics only.
# Based on mc_rtc LIPMStabilizer sample adapted for Harambe.
---
Managed: false
StepByStep: false
IdleKeepState: true
VerboseStateFactory: false

# Built-in FSM states
StatesLibraries:
  - /usr/local/lib/mc_controller/fsm/states
StatesFiles:
  - /usr/local/lib/mc_controller/fsm/states/data

# General constraints
constraints:
  - type: contact
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
  - type: compoundJoint
collisions: []
contacts: []

# Observer: IMU + kinematics (works on real robot too)
ObserverPipelines:
  - name: MainPipeline
    gui: true
    observers:
      - type: Encoder
      - type: KinematicInertial
        update: true
        config:
          bodySensor: PelvisIMU

# Robot posture defaults
Harambe:
  posture:
    stiffness: 2.0
    weight: 10.0

robots:
  ground:
    module: env/ground

##############################################################################
# States (ordered by inheritance: base → derived)
##############################################################################
states:

  # ========== Level 1: built-in bases (Pause, StabilizerStandingState, MetaTasks) ==========

  Harambe::Pause:
    base: Pause
    duration: 2

  Harambe::Standing:
    base: StabilizerStandingState
    stiffness: 5
    StabilizerConfig:
      type: lipm_stabilizer
      enabled: true
      contacts: [Left, Right]
      leftFootSurface: LeftFootCenter
      rightFootSurface: RightFootCenter
      torsoBodyName: urdf_simplified_torso
      friction: 0.7

      # No force sensors - disable safety thresholds
      safetyThresholds:
        MIN_DS_PRESSURE: 0.0
        MIN_NET_TOTAL_FORCE_ZMP: 0.0

      tasks:
        com:
          stiffness: [1000, 1000, 100]
          weight: 1000
          height: 0.8
          active_joints:
            - Root
            - waist_yaw_joint_X8
            - left_hip_pitch_joint_X8
            - left_hip_roll_joint_X8
            - left_hip_yaw_joint_X8
            - left_knee_joint_X8
            - left_ankle_pitch_joint_X4
            - left_ankle_roll_joint_X4
            - right_hip_pitch_joint_X8
            - right_hip_roll_joint_X8
            - right_hip_yaw_joint_X8
            - right_knee_joint_X8
            - right_ankle_pitch_joint_X4
            - right_ankle_roll_joint_X4
        contact:
          damping: 300
          stiffness: 1
          weight: 10000
        pelvis:
          stiffness: 10
          weight: 100
        torso:
          stiffness: 10
          weight: 100
          pitch: 0

      fdqp_weights:
        net_wrench: 10000
        ankle_torque: 100
        pressure: 1
        regularization: 0.01

      # No force sensor admittance - feedforward only
      admittance:
        cop: [0.0, 0.0]
        df: [0.0, 0.0, 0.0]
        df_damping: [0.0, 0.0, 0.0]
        maxVel:
          linear: [0.3, 0.3, 0.3]
          angular: [0.5, 0.5, 0.5]

      dcm_tracking:
        gains:
          prop: 3.0
          integral: 2
          deriv: 0.5
        derivator_cutoff_period: 1
        integrator_time_constant: 15

      Left:
        overwriteRPY:
          roll: 0
          pitch: 0
          yaw: -5
        height: 0
      Right:
        overwriteRPY:
          roll: 0
          pitch: 0
          yaw: 5
        height: 0

    AddContacts:
      - r2: ground
        r1Surface: LeftFootCenter
        r2Surface: AllGround
        dof: [1, 1, 1, 1, 1, 1]
      - r2: ground
        r1Surface: RightFootCenter
        r2Surface: AllGround
        dof: [1, 1, 1, 1, 1, 1]

  # Single support (no completion - held by parent)
  # Do NOT inherit from Standing to avoid AddContacts with dof locking X/Y
  Harambe::LeftSupport:
    base: StabilizerStandingState
    stiffness: 5
    completion: {}
    above: LeftSurface
    StabilizerConfig:
      type: lipm_stabilizer
      enabled: true
      contacts: [Left]
      leftFootSurface: LeftFootCenter
      rightFootSurface: RightFootCenter
      torsoBodyName: urdf_simplified_torso
      friction: 0.7
      safetyThresholds:
        MIN_DS_PRESSURE: 0.0
        MIN_NET_TOTAL_FORCE_ZMP: 0.0
      tasks:
        com:
          stiffness: [200, 200, 100]
          damping: [150, 150, 50]
          weight: 1000
          height: 0.8
          active_joints:
            - Root
            - waist_yaw_joint_X8
            - left_hip_pitch_joint_X8
            - left_hip_roll_joint_X8
            - left_hip_yaw_joint_X8
            - left_knee_joint_X8
            - left_ankle_pitch_joint_X4
            - left_ankle_roll_joint_X4
            - right_hip_roll_joint_X8
            - right_hip_yaw_joint_X8
            - right_knee_joint_X8
            - right_ankle_pitch_joint_X4
            - right_ankle_roll_joint_X4
        contact:
          damping: 300
          stiffness: 1
          weight: 10000
        pelvis:
          stiffness: 10
          weight: 100
        torso:
          stiffness: 10
          weight: 100
          pitch: 0
      fdqp_weights:
        net_wrench: 10000
        ankle_torque: 100
        pressure: 1
        regularization: 0.01
      admittance:
        cop: [0.0, 0.0]
        df: [0.0, 0.0, 0.0]
        df_damping: [0.0, 0.0, 0.0]
      dcm_tracking:
        gains:
          prop: 2.0
          integral: 1
          deriv: 0.3
        derivator_cutoff_period: 1
        integrator_time_constant: 15
      Left:
        overwriteRPY:
          roll: 0
          pitch: 0
          yaw: -5
        height: 0
      Right:
        overwriteRPY:
          roll: 0
          pitch: 0
          yaw: 5
        height: 0
    AddContacts:
      - r2: ground
        r1Surface: LeftFootCenter
        r2Surface: AllGround
        dof: [1, 1, 1, 1, 1, 1]

  Harambe::RightSupport:
    base: StabilizerStandingState
    stiffness: 5
    completion: {}
    above: RightSurface
    StabilizerConfig:
      type: lipm_stabilizer
      enabled: true
      contacts: [Right]
      leftFootSurface: LeftFootCenter
      rightFootSurface: RightFootCenter
      torsoBodyName: urdf_simplified_torso
      friction: 0.7
      safetyThresholds:
        MIN_DS_PRESSURE: 0.0
        MIN_NET_TOTAL_FORCE_ZMP: 0.0
      tasks:
        com:
          stiffness: [200, 200, 100]
          damping: [150, 150, 50]
          weight: 1000
          height: 0.8
          active_joints:
            - Root
            - waist_yaw_joint_X8
            - left_hip_roll_joint_X8
            - left_hip_yaw_joint_X8
            - left_knee_joint_X8
            - left_ankle_pitch_joint_X4
            - left_ankle_roll_joint_X4
            - right_hip_pitch_joint_X8
            - right_hip_roll_joint_X8
            - right_hip_yaw_joint_X8
            - right_knee_joint_X8
            - right_ankle_pitch_joint_X4
            - right_ankle_roll_joint_X4
        contact:
          damping: 300
          stiffness: 1
          weight: 10000
        pelvis:
          stiffness: 10
          weight: 100
        torso:
          stiffness: 10
          weight: 100
          pitch: 0
      fdqp_weights:
        net_wrench: 10000
        ankle_torque: 100
        pressure: 1
        regularization: 0.01
      admittance:
        cop: [0.0, 0.0]
        df: [0.0, 0.0, 0.0]
        df_damping: [0.0, 0.0, 0.0]
      dcm_tracking:
        gains:
          prop: 2.0
          integral: 1
          deriv: 0.3
        derivator_cutoff_period: 1
        integrator_time_constant: 15
      Left:
        overwriteRPY:
          roll: 0
          pitch: 0
          yaw: -5
        height: 0
      Right:
        overwriteRPY:
          roll: 0
          pitch: 0
          yaw: 5
        height: 0
    AddContacts:
      - r2: ground
        r1Surface: RightFootCenter
        r2Surface: AllGround
        dof: [1, 1, 1, 1, 1, 1]

  Harambe::LiftRightFoot:
    base: MetaTasks
    tasks:
      LiftFootTask:
        type: transform
        stiffness: 50
        damping: 30
        weight: 200
        frame: RightFootCenter
        moveWorld:
          translation: [0, 0, 0.03]
        completion:
          OR:
            - eval: 0.01
            - AND:
              - timeout: 3
              - speed: 0.003

  Harambe::PutRightFoot:
    base: MetaTasks
    tasks:
      PutFootTask:
        type: transform
        stiffness: 50
        damping: 30
        weight: 500
        frame: RightFootCenter
        moveWorld:
          translation: [0, 0, -0.005]
        overwriteRPY:
          roll: 0
          pitch: 0
        completion:
          OR:
            - AND:
              - timeout: 1.5
              - speed: 0.002
            - timeout: 3

  Harambe::RightFootTrajectory:
    base: MetaTasks
    tasks:
      SwingFootTrajectory:
        type: exact_cubic_trajectory
        surface: RightFootCenter
        stiffness: 2000.0
        damping: 120.0
        duration: 4.0
        weight: 100
        displaySamples: 20
        completion:
          OR:
            - timeElapsed: true
            - AND:
              - timeout: 2.0
              - speed: 0.005
        targetSurface:
          surface: RightFootCenter
          translation: [0.12, 0.0, 0.005]
          rotation: [0, 0, 0]
          controlPoints:
            - time: 2.0
              position: [0.05, 0.0, 0.04]

  # ========== Level 2: derived from Level 1 ==========

  Harambe::GoCenter::Stabilizer:
    base: Harambe::Standing
    above: CenterSurfaces
    completion: {}

  Harambe::GoCenter::Timer:
    base: Pause
    duration: 2.0

  Harambe::LiftLeftFoot:
    base: Harambe::LiftRightFoot
    tasks:
      LiftFootTask:
        frame: LeftFootCenter

  Harambe::PutLeftFoot:
    base: Harambe::PutRightFoot
    tasks:
      PutFootTask:
        frame: LeftFootCenter
        moveWorld:
          translation: [0, 0, -0.005]

  Harambe::LeftFootTrajectory:
    base: Harambe::RightFootTrajectory
    tasks:
      SwingFootTrajectory:
        surface: LeftFootCenter
        targetSurface:
          surface: LeftFootCenter
          translation: [0.12, 0.0, 0.005]
          rotation: [0, 0, 0]
          controlPoints:
            - time: 2.0
              position: [0.05, 0.0, 0.04]

  # ========== Level 3: Parallel (combining Level 1 + 2) ==========

  Harambe::GoCenter:
    base: Parallel
    states: [Harambe::GoCenter::Stabilizer, Harambe::GoCenter::Timer]

  Harambe::Stabilized::LiftRightFoot:
    base: Parallel
    states: [Harambe::LeftSupport, Harambe::LiftRightFoot]
    RemoveContacts:
      - r2: ground
        r1Surface: RightFootCenter
        r2Surface: AllGround

  Harambe::Stabilized::LiftLeftFoot:
    base: Parallel
    states: [Harambe::RightSupport, Harambe::LiftLeftFoot]
    RemoveContacts:
      - r2: ground
        r1Surface: LeftFootCenter
        r2Surface: AllGround

  Harambe::Stabilized::PutRightFoot:
    base: Parallel
    states: [Harambe::LeftSupport, Harambe::PutRightFoot]
    AddContactsAfter:
      - r2: ground
        r1Surface: RightFootCenter
        r2Surface: AllGround
        dof: [1, 1, 1, 1, 1, 1]

  Harambe::Stabilized::PutLeftFoot:
    base: Parallel
    states: [Harambe::RightSupport, Harambe::PutLeftFoot]
    AddContactsAfter:
      - r2: ground
        r1Surface: LeftFootCenter
        r2Surface: AllGround
        dof: [1, 1, 1, 1, 1, 1]

  Harambe::Stabilized::RightFootTrajectory:
    base: Parallel
    states: [Harambe::LeftSupport, Harambe::RightFootTrajectory]
    RemoveContacts:
      - r2: ground
        r1Surface: RightFootCenter
        r2Surface: AllGround

  Harambe::Stabilized::LeftFootTrajectory:
    base: Parallel
    states: [Harambe::RightSupport, Harambe::LeftFootTrajectory]
    RemoveContacts:
      - r2: ground
        r1Surface: LeftFootCenter
        r2Surface: AllGround

  # ========== Level 4: Meta (combining Level 3) ==========

  Harambe::LeftStepForward:
    base: Meta
    transitions:
      - [Harambe::Stabilized::LiftLeftFoot, OK, Harambe::Stabilized::LeftFootTrajectory, Auto]
      - [Harambe::Stabilized::LeftFootTrajectory, OK, Harambe::Stabilized::PutLeftFoot, Auto]
      - [Harambe::Stabilized::PutLeftFoot, OK, Harambe::GoCenter, Auto]

  Harambe::RightStepForward:
    base: Meta
    transitions:
      - [Harambe::Stabilized::LiftRightFoot, OK, Harambe::Stabilized::RightFootTrajectory, Auto]
      - [Harambe::Stabilized::RightFootTrajectory, OK, Harambe::Stabilized::PutRightFoot, Auto]
      - [Harambe::Stabilized::PutRightFoot, OK, Harambe::GoCenter, Auto]

  # ========== Level 5: top-level walking FSM ==========

  Harambe::StepForward:
    base: Meta
    transitions:
      - [Harambe::LeftStepForward, OK, Harambe::RightStepForward, Auto]
##############################################################################
# Transitions
##############################################################################
transitions:
  - [Harambe::Pause, OK, Harambe::Standing, Auto]
  # Step forward
  - [Harambe::Standing, Step Forward, Harambe::StepForward, Auto]
  - [Harambe::StepForward, OK, Harambe::Standing, Auto]
  # Left step test
  - [Harambe::Standing, Left Step, Harambe::LeftStepForward, Auto]
  - [Harambe::LeftStepForward, OK, Harambe::Standing, Auto]
  # Right step test
  - [Harambe::Standing, Right Step, Harambe::RightStepForward, Auto]
  - [Harambe::RightStepForward, OK, Harambe::Standing, Auto]

init: Harambe::Pause
